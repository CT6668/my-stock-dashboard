name: 📊 每日股票数据更新

on:
  # 定时触发（UTC时间，北京时间=UTC+8）
  schedule:
    # 每个工作日 09:20 北京时间（A股开盘前10分钟）= 01:20 UTC
    - cron: '20 1 * * 1-5'
    # 每个工作日 15:05 北京时间（A股收盘后5分钟）= 07:05 UTC
    - cron: '5 7 * * 1-5'
    # 每个工作日 12:05 北京时间（午间补充）= 04:05 UTC
    - cron: '5 4 * * 1-5'

  # 允许手动触发（在 GitHub Actions 页面点击 Run workflow）
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动更新数据'

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # 允许写入仓库内容

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖（无额外依赖，仅用标准库）
        run: echo "使用 Python 标准库，无需安装额外依赖"

      - name: 🔄 采集最新数据
        env:
          FINNHUB_KEY:  ${{ secrets.FINNHUB_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/fetch_stock_data.py

      - name: ✅ 验证数据文件
        run: |
          echo "=== 检查生成的数据文件 ==="
          if [ -f "data/module1_latest.json" ]; then
            echo "✅ module1: $(python -c "import json; d=json.load(open('data/module1_latest.json')); print(f'{len(d)} 只股票')")"
          fi
          if [ -f "data/module2_latest.json" ]; then
            echo "✅ module2: $(python -c "import json; d=json.load(open('data/module2_latest.json')); print(f'{len(d)} 条新闻')")"
          fi
          if [ -f "data/module3_latest.json" ]; then
            echo "✅ module3: $(python -c "import json; d=json.load(open('data/module3_latest.json')); print(f'{len(d)} 条舆情')")"
          fi

      - name: 📤 提交数据到仓库
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 检查是否有变化
          if git diff --staged --quiet; then
            echo "数据无变化，跳过提交"
          else
            CST=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M CST')
            git commit -m "data: auto update [$CST]"
            git push
            echo "✅ 数据已推送到仓库"
          fi
